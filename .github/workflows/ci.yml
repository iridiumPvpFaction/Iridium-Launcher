name: Launcher Build

on:
  push:
    branches: [ main ]

jobs:
  create-release-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Get version
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_ENV

      - name: Create Release Draft
        id: create_release_draft
        run: |
          response=$(curl -X POST -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{\"tag_name\": \"${{ env.version }}\", \"name\": \"release ${{ env.version }}\", \"draft\": true}")
          release_id=$(echo "$response" | jq -r .id)
          echo "release_id=$release_id" >> $GITHUB_ENV

  build-launcher:
    needs: create-release-draft
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v1

      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18.x

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: Install Dependencies
        run: npm ci
        shell: bash

      - name: Build
        env:
          GH_TOKEN: ${{ secrets.github_token }}
        run: npm run build
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v2
        with:
          name: release-artifact
          path: path/to/your/artifact

  finalize-release-draft:
    needs: build-launcher
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Get release_id
        run: echo "release_id=$(cat $GITHUB_ENV | grep release_id | cut -d'=' -f2)" >> $GITHUB_ENV

      - name: Publish Release Draft
        run: |
          curl -X PATCH -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/$release_id" \
            -d '{"draft": false}'
